transcript:
  provider: anthropic # anthropic | openai
  model: claude-sonnet-5 # fallback used only if `models` has no entry for `provider`
  models:
    anthropic: claude-sonnet-5
    openai: gpt-4o
  max_input_tokens: 12000
  target_words: [320, 420]

tts:
  provider: edge # edge | elevenlabs
  voice: en-US-AndrewMultilingualNeural
  rate: "+8%" # slight pace-up to match the reference style

storage:
  bucket: recordings
  upsert: false

logging:
  level: INFO
  file: logs/paper2pod.log

cta:
  enabled: true
  text: >
    If this got you curious, head over to OpenLabs and explore the projects
    other researchers are working on. And if you have research of your own,
    share it there. The next breakthrough might be yours.

openlabs:
  base_url: https://openlabs.bio.xyz
  cache_ttl_hours: 24
  min_content_words: 200

api:
  host: 127.0.0.1
  port: 8000
  max_upload_mb: 2
  max_pdf_mb: 32 # PDF upload cap; Anthropic accepts up to 32 MB / 100 pages
  job_db: jobs.db
  job_retention_days: 30
  allowed_openlabs_hosts: [] # empty = only openlabs.base_url's host is accepted
